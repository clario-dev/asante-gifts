<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>BestGiftHunt</title>
    <script>
      // GitHub Pages SPA fallback: save the requested URL and redirect to root
      (function () {
        sessionStorage.setItem(
          'bgh_redirect',
          location.pathname + location.search + location.hash
        );
        location.replace('/');
      })();
    </script>
  </head>
  <body></body>
</html>
